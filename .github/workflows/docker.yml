name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

env:
  OWNER: ${{ github.repository_owner }}
  REPO: ${{ github.event.repository.name }}

jobs:

  test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests (JUnit + Cucumber)
        run: mvn clean test

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-results
          path: |
            target/surefire-reports/
            target/cucumber-reports.json
            target/allure-results/

  docker:
    needs: test-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Normalize image name (lowercase)
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${OWNER_LOWER}/atbp-laba3/backend:latest" >> $GITHUB_ENV

      - name: Login GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE .

      - name: Push Docker image
        run: docker push $IMAGE

  publish-allure:
    needs: [test-build, docker]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download backend results
        uses: actions/download-artifact@v4
        with:
          name: backend-results
          path: backend-results

      - name: Install Allure CLI
        run: npm install -g allure-commandline --unsafe-perm=true

      - name: Generate Allure report
        run: allure generate backend-results --clean -o allure-report

      - name: Fix Pages structure
        run: |
          cp -r allure-report/* .
          rm -rf allure-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-pages:
    needs: publish-allure
    runs-on: ubuntu-latest
    if: always() && needs.publish-allure.result == 'success'
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  notify:
    needs: [test-build, docker, publish-allure]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Telegram message
        run: |
          STATUS="SUCCESS"

          if [ "${{ needs.test-build.result }}" != "success" ] || [ "${{ needs.docker.result }}" != "success" ]; then
            STATUS="FAILED"
          fi
          
          REPORT_URL="https://${{ env.OWNER }}.github.io/${{ env.REPO }}/"

          MESSAGE="Backend CI finished%0A\
          Status: $STATUS%0A\
          Repo: ${{ github.repository }}%0A\
          Allure report: $REPORT_URL%0A\
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
  
              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d text="$MESSAGE"